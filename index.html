<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello, AGOL!</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

<!-- ArcGIS API for JavaScript -->
<link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.25/"></script>

<!-- Initialize the ArcGIS API for JavaScript -->
<script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/Graphic",
    "esri/layers/GraphicsLayer",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Expand",
    "esri/widgets/Locate",
    "esri/widgets/Search"
  ], function(esriConfig, Map, MapView, Graphic, GraphicsLayer, BasemapGallery, Expand, Locate, Search) {
    // Map implementation code 
    esriConfig.apiKey = "AAPTaXW4BVW_ro3UyCh2wpLtbsw..S4T9V5K_hlh_60RGW9t_q7htVqq7iscsvxjm7dd1G8h2i2HUDFCe1l-xBCMaummjmRdIHDLSbsD8DI04VAG9NpUw0YA_nIOccQtabmzOOAcTL6hKl7cTkLMIlXQgwoVMZJbFA3l6_6KFWsMeGQQJCIydC6G0tbHy3E12vEZknZ7DtoweCnBZa-zK4eZnLJPEOQ6f-5q6gQv_sdJZgPHH1FcV0esU1rH-iaopU2P7UXhTG_o68RTsAtcuGj1TIC8dZNJu8W8ieWk.AT1_5tp0GXlO";
  // Create the Map instance
const map = new Map({
  basemap: "arcgis-streets-night" // Map service style
});

// Create the MapView container rendering our map
const view = new MapView({
  map: map,
  center: [-87.8131, 42.5811], // Longitude, latitude format
  zoom: 14, // Zoom scale level
  container: "viewDiv" // ID of our body div
});

// Create a GraphicsLayer to hold our graphics
const graphicsLayer = new GraphicsLayer();
map.add(graphicsLayer);

// Create a point geometry for the location of interest
const point = {
  type: "point",
  longitude: -87.8177658, // Coordinates for Frank's Diner
  latitude: 42.5834933
};

//Defining the marker style
const markerSymbol = {
  type: "simple-marker",
  color: "red",
  style: "diamond",
  outline: {
    color: "white",
    width: 1
  }
};

// Defining the popup content for the point
const popupTemplate = {
  title: "{Name}",
  content: "{Description}"
};
const attributes = {
  Name: "Frank's Diner",
  Description: "Lunch-car joint serving up burgers, breakfast & other classic diner fare since 1926."
};

// Creating the point
const pointGraphic = new Graphic({
  geometry: point,
  symbol: markerSymbol,
  // Adding popup properties to the point graphic
  popupTemplate: popupTemplate,
  attributes: attributes
});

// Add the point graphic to the graphics layer
graphicsLayer.add(pointGraphic);

// Add a basemap gallery widget to the view
const basemapGallery = new BasemapGallery({
  view: view
});

// Create an Expand instance to hold the basemap gallery widget
const basemapGalleryExpand = new Expand({
  expandIcon: "layers",  
  view: view,
  content: basemapGallery
});
// Add basemap gallery widget to the top right corner of the view
view.ui.add(basemapGalleryExpand, {
  position: "top-right"
});

// Create a locate widget to find and display the user's location
const locateWidget = new Locate({
  view: view,
  useGraphicLocation: true // Highlights the user's location
});

// Add the locate widget to the bottom left corner of the UI
view.ui.add(locateWidget, {
  position: "bottom-left"
});

// Create a Search widget to search for locations and features
const searchWidget = new Search({
  view: view
});

// Adds the search widget below other elements in the bottom right corner
view.ui.add(searchWidget, {
  position: "bottom-right",
});

});
</script>

<!-- CSS to make the map fullscreen -->

<style>
  html, 
  body, 
  #viewDiv {
    padding: 0;
    margin: 0;
    height: 100%;
    width: 100%;
  }
</style>

</head>
<body>

<!-- Create a zoom element for the ArcGIS API for JavaScript map view -->

<div id="viewDiv"></div>

</body>
</html>
